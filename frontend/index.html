<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />

    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#10b981" />
    <meta name="msapplication-TileColor" content="#10b981" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="InFlux" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="InFlux" />
    <meta name="description" content="Find EV charging stations and plan routes for your electric vehicle across India" />
    <meta property="og:title" content="InFlux - EV Charging Stations" />
    <meta property="og:description" content="Find EV charging stations and plan your EV route" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icon-512.svg" />

    <link rel="icon" type="image/svg+xml" href="/icon-192.svg" />

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

    <style>
      /* Prevent ALL horizontal scroll — the #1 mobile fix */
      html, body {
        margin: 0; padding: 0;
        overflow-x: hidden !important;
        max-width: 100vw !important;
        width: 100% !important;
      }
      html { height: 100%; }
      body {
        height: 100%;
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
      #root {
        height: 100%;
        overflow-x: hidden;
        max-width: 100vw;
        width: 100%;
      }
      * { touch-action: manipulation; box-sizing: border-box; }
    </style>

    <title>InFlux - EV Charging Station Locator</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registered:', reg.scope))
            .catch(err => console.log('SW failed:', err));
        });
      }
    </script>
  </body>
</html>
